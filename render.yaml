services:
  - type: worker
    name: baseke-ceo-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: DIFY_API_KEY
        sync: false
      - key: DIFY_API_URL
        value: https://api.dify.ai/v1/chat-messages
